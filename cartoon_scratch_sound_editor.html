<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scratch 3.0 Style Sound Editor – Cartoon Voice Generator</title>
<style>
body{margin:0;font-family:Arial;background:#2e2e2e;color:white}
header{background:#ffab19;padding:10px;font-size:20px}
#editor{display:flex;height:calc(100vh - 50px)}
#sounds{width:220px;background:#1f1f1f;padding:10px}
#workspace{flex:1;background:#3a3a3a;padding:15px}
button{width:100%;margin-bottom:6px;padding:8px;background:#4c97ff;border:none;border-radius:4px;color:white}
.effect{background:#855cd6}
.cartoon{background:#ff6680}
</style>
</head>
<body>
<header>🎧 Scratch 3.0 Sound Editor (Extended)</header>
<div id="editor">
<div id="sounds">
<input type="file" id="upload" accept="audio/*">
<button onclick="play()">▶ Play</button>
</div>
<div id="workspace">
<h3>Cartoon Voice Generator</h3>
<button class="cartoon" onclick="randomCartoon()">🎲 Random Cartoon Voice</button>
<button class="cartoon" onclick="pitch(35)">🐿 High Cartoon</button>
<button class="cartoon" onclick="pitch(-25)">👹 Low Cartoon</button>
</div>
</div>
<script>
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let buffer;
document.getElementById("upload").onchange=async e=>{
const f=e.target.files[0];
buffer=await ctx.decodeAudioData(await f.arrayBuffer());
}
function play(){
if(!buffer)return;
let s=ctx.createBufferSource();
s.buffer=buffer;
s.connect(ctx.destination);
s.start();
}
function pitch(v){
if(!buffer)return;
let s=ctx.createBufferSource();
s.buffer=buffer;
s.playbackRate.value=Math.pow(2,v/1200);
s.connect(ctx.destination);
s.start();
}
function randomCartoon(){
pitch(Math.random()*40-10);
}
</script>
</body>
</html>
